<!DOCTYPE html>
<html>
  <head>
    <title>Options Page</title>
  </head>
  <body>
    <h1>Options Page</h1>
    <p>Select your favorite season:</p>
    <form id="options-form">
      <input type="radio" id="spring1" name="season" value="spring1">
      <label for="spring1">Spring 1</label><br>
      <input type="radio" id="spring2" name="season" value="spring2">
      <label for="spring2">Spring 2</label><br>
      <button type="submit">Save</button>
    </form>
    <script src="options.js"></script>
  </body>
</html>
